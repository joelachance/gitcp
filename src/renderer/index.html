<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>GitCP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="hidden">
      <header class="bar">
        <span class="brand">GitCP</span>
        <span id="auth-badge" class="badge"></span>
        <button type="button" id="btn-auth" class="btn-auth"></button>
      </header>
      <input
        id="query"
        type="search"
        placeholder="Search issues & PRs on GitHub…"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="hint" class="hint"></div>
      <ul id="results" class="results" role="listbox" aria-label="Search results"></ul>
      <footer class="footer">
        <span id="shortcut-hint"></span>
      </footer>
    </div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
