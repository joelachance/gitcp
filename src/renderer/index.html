<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>GitCP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="hidden">
      <div class="drag-strip" aria-hidden="true"></div>
      <div class="shell">
        <div class="composer">
          <input
            id="query"
            type="text"
            placeholder="Ask GitHub… search issues & pull requests"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" id="btn-auth" class="btn-auth"></button>
        </div>
        <div id="hint" class="hint"></div>
        <ul id="results" class="results" role="listbox" aria-label="Search results"></ul>
        <p id="shortcut-note" class="shortcut-note"></p>
      </div>
    </div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
